<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Abigail Lucia</title>
    
    <meta property="og:title" content="¡Estás invitado a mis 15 años!">
    <meta property="og:description" content="Acompáñame a celebrar este día especial.">
    <meta property="og:image" content="https://github.com/MarilynElena03/invitacion/blob/main/imagen_invitacion.png?raw=true">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000b30; /* Color azul profundo del fondo de tu imagen */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            max-width: 500px; /* Tamaño ideal para móvil */
            width: 100%;
            line-height: 0;
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* El botón invisible que se pone encima del tuyo */
        .overlay-button {
            position: absolute;
            /* Estos valores posicionan el link justo sobre tu botón plateado */
            bottom: 18%; 
            left: 30%;
            width: 45%;
            height: 8%;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); /* Totalmente invisible */
            border: none;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
       <img src="imagen_invitacion.png" alt="Invitación 15 años" class="invitation-img">
        
        <a href="https://forms.office.com/r/LCHtmrKUhx" class="overlay-button" target="_blank"></a>
    </div>

</body>
</html>
