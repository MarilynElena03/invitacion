<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Abigail Lucia</title>
    
    <meta property="og:title" content="¡Estás invitado a mis 15 años!">
    <meta property="og:description" content="Acompáñame a celebrar este día especial.">
    <meta property="og:image" content="https://raw.githubusercontent.com/MarilynElena03/invitacion/main/imagen_invitacion.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* CAMBIO: Color de fondo púrpura profundo para combinar con tu nueva imagen */
            background-color: #2b003d; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        .container {
            position: relative;
            max-width: 500px;
            width: 100%;
            line-height: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Sombra para que se vea más profesional */
        }

        .invitation-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .overlay-button {
            position: absolute;
            /* AJUSTE: Posición para que caiga justo sobre el botón rosa redondeado */
            bottom: 15%; 
            left: 20%;
            width: 60%;
            height: 11%;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0); /* Sigue siendo invisible */
            border: none;
            text-decoration: none;
            display: block;
            border-radius: 20px; /* Redondeado igual que el diseño de tu imagen */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="imagen_invitacion.png" alt="Invitación 15 años" class="invitation-img">
        
        <a href="https://forms.office.com/r/LCHtmrKUhx" class="overlay-button" target="_blank"></a>
    </div>

</body>
</html>
